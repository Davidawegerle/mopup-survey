<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MU Mop-Up Survey · CCCIS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2333;
    --border:  #30363d;
    --accent:  #00e5ff;
    --accent2: #f97316;
    --success: #3fb950;
    --text:    #e6edf3;
    --muted:   #7d8590;
    --danger:  #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  header {
    background: var(--surface); border-bottom: 2px solid var(--accent);
    padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .brand { font-size: 16px; font-weight: 800; color: var(--accent); }
  .brand span { color: var(--text); font-weight: 400; }
  .trip-badge {
    font-size: 11px; font-weight: 700; background: var(--accent);
    color: #000; padding: 3px 10px; border-radius: 20px; letter-spacing: .5px;
  }

  .live-bar {
    background: #0a0e14; border-bottom: 1px solid var(--border);
    padding: 8px 20px; display: flex; align-items: center; gap: 12px;
    font-size: 12px; color: var(--muted);
  }
  .clock { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: 1px; font-variant-numeric: tabular-nums; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  .container { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .card-title {
    font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.2px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }

  input, select, textarea {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 12px 14px; font-family: Inter, sans-serif;
    font-size: 15px; width: 100%; outline: none; transition: border-color .15s;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[readonly] {
    color: var(--accent); font-weight: 700; font-size: 16px;
    letter-spacing: .5px; cursor: default; border-color: transparent; background: #0d1117;
  }
  select option { background: var(--card); }

  .reg-display {
    font-size: 20px; font-weight: 800; color: var(--accent2);
    letter-spacing: 2px; text-align: center; padding: 10px;
    background: #0d1117; border-radius: 7px; border: 1px solid var(--border); min-height: 46px;
  }

  /* Place pills */
  .place-group { display: flex; flex-direction: column; gap: 8px; }
  .place-row { display: flex; gap: 8px; align-items: center; }
  .place-pill {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 11px 10px; font-size: 13px; font-weight: 500;
    color: var(--muted); cursor: pointer; text-align: center; transition: all .15s; user-select: none;
  }
  .place-pill.selected { background: rgba(0,229,255,.1); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .place-input { flex: 1; display: none; }
  .place-input.show { display: block; }

  /* Pax counter */
  .counter-row { display: flex; align-items: center; gap: 12px; }
  .counter-btn {
    width: 50px; height: 50px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 24px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .1s; user-select: none;
  }
  .counter-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }
  .counter-val { flex: 1; text-align: center; font-size: 40px; font-weight: 800; color: var(--accent); letter-spacing: 1px; }

  /* Time */
  .time-field { display: flex; align-items: center; gap: 10px; }
  .time-field input { flex: 1; }
  .time-set-btn {
    background: var(--accent2); border: none; border-radius: 7px; padding: 12px 14px;
    color: #fff; font-family: Inter, sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: .5px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .time-set-btn:active { opacity: .8; }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 16px; background: var(--accent); color: #000; border: none;
    border-radius: 10px; font-family: Inter, sans-serif; font-size: 17px; font-weight: 800;
    letter-spacing: .5px; text-transform: uppercase; cursor: pointer; transition: opacity .15s; margin-top: 8px;
  }
  .submit-btn:active { opacity: .8; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success); color: #000; font-size: 14px; font-weight: 700;
    padding: 12px 28px; border-radius: 40px; transition: transform .3s ease;
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="brand">CCCIS <span>· Mop-Up Survey</span></div>
  <div class="trip-badge" id="tripBadge">TRIP —</div>
</header>

<div class="live-bar">
  <span class="dot"></span>
  <span class="clock" id="liveClock">00:00:00</span>
  <span id="liveDate" style="margin-left:4px"></span>
  <span style="margin-left:auto;font-size:11px">RUSTENBURG TRANSIT</span>
</div>

<div class="container">

  <!-- VEHICLE -->
  <div class="card">
    <div class="card-title">🚐 MU Vehicle</div>
    <div class="field">
      <label>Select MU Vehicle</label>
      <select id="vehicleSelect" onchange="onVehicleSelect(this)">
        <option value="">— Loading vehicles… —</option>
      </select>
    </div>
    <div class="field">
      <label>Registration Plate</label>
      <div class="reg-display" id="regDisplay">—</div>
    </div>
  </div>

  <!-- TRIP FROM -->
  <div class="card">
    <div class="card-title">📍 Trip From</div>
    <div class="place-group" id="fromGroup">
      <div class="place-row">
        <div class="place-pill" data-group="from" data-val="Rank" onclick="selectPlace('from',this)">Rank</div>
        <div class="place-pill" data-group="from" data-val="Tlhabane" onclick="selectPlace('from',this)">Tlhabane</div>
        <div class="place-pill" data-group="from" data-val="Waterfall Mall" onclick="selectPlace('from',this)">Waterfall Mall</div>
      </div>
      <div class="place-row">
        <div class="place-pill" data-group="from" data-val="CBD" onclick="selectPlace('from',this,'fromCBD')">CBD</div>
        <input class="place-input" id="fromCBD" type="text" placeholder="Specify CBD location…" oninput="updateCustomPlace('from',this)">
      </div>
      <div class="place-row">
        <div class="place-pill" data-group="from" data-val="Other" onclick="selectPlace('from',this,'fromOther')">Other</div>
        <input class="place-input" id="fromOther" type="text" placeholder="Specify location…" oninput="updateCustomPlace('from',this)">
      </div>
    </div>
  </div>

  <!-- TRIP TO -->
  <div class="card">
    <div class="card-title">🏁 Trip To</div>
    <div class="place-group" id="toGroup">
      <div class="place-row">
        <div class="place-pill" data-group="to" data-val="Town" onclick="selectPlace('to',this)">Town</div>
        <div class="place-pill" data-group="to" data-val="Tlhabane" onclick="selectPlace('to',this)">Tlhabane</div>
        <div class="place-pill" data-group="to" data-val="Waterfall Mall" onclick="selectPlace('to',this)">Waterfall Mall</div>
      </div>
      <div class="place-row">
        <div class="place-pill" data-group="to" data-val="CBD" onclick="selectPlace('to',this,'toCBD')">CBD</div>
        <input class="place-input" id="toCBD" type="text" placeholder="Specify CBD location…" oninput="updateCustomPlace('to',this)">
      </div>
      <div class="place-row">
        <div class="place-pill" data-group="to" data-val="Other" onclick="selectPlace('to',this,'toOther')">Other</div>
        <input class="place-input" id="toOther" type="text" placeholder="Specify location…" oninput="updateCustomPlace('to',this)">
      </div>
    </div>
  </div>

  <!-- DEPARTURE TIME -->
  <div class="card">
    <div class="card-title">⏱ Departure Time</div>
    <div class="field">
      <div class="time-field">
        <input type="text" id="departureTime" readonly placeholder="Tap SET NOW">
        <button class="time-set-btn" onclick="setTime('departureTime')">SET NOW</button>
      </div>
    </div>
  </div>

  <!-- PAX COUNTS -->
  <div class="card">
    <div class="card-title">👥 Passenger Count</div>
    <div class="field">
      <label>Pax on board as observed</label>
      <div class="counter-row">
        <button class="counter-btn" onclick="adjustCount('paxOnBoard',-1)">−</button>
        <div class="counter-val" id="paxOnBoard">0</div>
        <button class="counter-btn" onclick="adjustCount('paxOnBoard',1)">+</button>
      </div>
    </div>
    <div class="field" style="margin-top:18px">
      <label>Pax getting in at this point</label>
      <div class="counter-row">
        <button class="counter-btn" onclick="adjustCount('paxIn',-1)">−</button>
        <div class="counter-val" id="paxIn">0</div>
        <button class="counter-btn" onclick="adjustCount('paxIn',1)">+</button>
      </div>
    </div>
  </div>

  <!-- TRIP END -->
  <div class="card">
    <div class="card-title">🔚 Trip End Time</div>
    <div class="field">
      <div class="time-field">
        <input type="text" id="endTime" readonly placeholder="Tap SET NOW at trip end">
        <button class="time-set-btn" onclick="setTime('endTime')">SET NOW</button>
      </div>
    </div>
  </div>

  <!-- INSPECTOR -->
  <div class="card">
    <div class="card-title">👤 Inspector</div>
    <div class="field">
      <label>Inspector Name</label>
      <input type="text" id="inspectorName" placeholder="Your name" autocomplete="name"
             oninput="localStorage.setItem('mu_inspector',this.value)">
    </div>
  </div>

  <button class="submit-btn" onclick="submitForm()">Submit Observation</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://api.cccis.space';

// ── State ────────────────────────────────────────────────────────────────────
let tripFrom = null, tripTo = null;
const counts = { paxOnBoard: 0, paxIn: 0 };
let _vehicles = [];

// ── Trip number ──────────────────────────────────────────────────────────────
function generateTripNo() {
  const d = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const seq = (parseInt(localStorage.getItem('mu_trip_seq_'+d)||'0') + 1);
  localStorage.setItem('mu_trip_seq_'+d, seq);
  return `MU-${d}-${String(seq).padStart(3,'0')}`;
}
let currentTripNo = generateTripNo();
document.getElementById('tripBadge').textContent = currentTripNo;

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('liveClock').textContent =
    now.toLocaleTimeString('en-ZA',{hour12:false});
  document.getElementById('liveDate').textContent =
    now.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
setInterval(updateClock, 1000);
updateClock();

// ── Load vehicles — exactly like driver_inspection ────────────────────────────
async function loadVehicles() {
  const sel = document.getElementById('vehicleSelect');
  try {
    const today = new Date().toISOString().slice(0,10);
    const [vRes, aRes] = await Promise.all([
      fetch(`${API}/api/dispatch/vehicles`),
      fetch(`${API}/api/dispatch/assignments?date=${today}`)
    ]);
    _vehicles = await vRes.json();
    const assignments = await aRes.json();
    const assignedNames = assignments.map(a => a.digitsync_name);

    // Filter to MU vehicles only
    const muAll = _vehicles.filter(v => (v.digitsync_name||'').toUpperCase().startsWith('MU'));
    const assigned = muAll.filter(v => assignedNames.includes(v.digitsync_name));
    const others   = muAll.filter(v => !assignedNames.includes(v.digitsync_name));

    let html = '<option value="">— Select MU Vehicle —</option>';
    if (assigned.length) {
      html += `<optgroup label="── Assigned Today ──">` +
        assigned.map(v => `<option value="${v.digitsync_name}" data-reg="${v.dimo_reg||'—'}">${v.digitsync_name}${v.dimo_reg ? ' · '+v.dimo_reg : ''}</option>`).join('') +
        '</optgroup>';
    }
    if (others.length) {
      html += `<optgroup label="── All MU Vehicles ──">` +
        others.map(v => `<option value="${v.digitsync_name}" data-reg="${v.dimo_reg||'—'}">${v.digitsync_name}${v.dimo_reg ? ' · '+v.dimo_reg : ''}</option>`).join('') +
        '</optgroup>';
    }
    sel.innerHTML = html;
  } catch(e) {
    sel.innerHTML = '<option value="">⚠ Could not load vehicles — check API</option>';
    console.error('Vehicle load error:', e);
  }
}
loadVehicles();

function onVehicleSelect(sel) {
  const opt = sel.options[sel.selectedIndex];
  const reg = opt?.dataset?.reg || '—';
  document.getElementById('regDisplay').textContent = reg !== '—' ? reg : '(not mapped)';
}

// ── Place selection ──────────────────────────────────────────────────────────
function selectPlace(group, el, inputId) {
  document.querySelectorAll(`.place-pill[data-group="${group}"]`).forEach(p => p.classList.remove('selected'));
  document.querySelectorAll(`#${group}Group .place-input`).forEach(i => { i.classList.remove('show'); i.value = ''; });
  el.classList.add('selected');
  // Always set the base value immediately so validation passes even without detail text
  if (group === 'from') tripFrom = el.dataset.val;
  else tripTo = el.dataset.val;
  if (inputId) {
    document.getElementById(inputId).classList.add('show');
    document.getElementById(inputId).focus();
  }
}
function updateCustomPlace(group, input) {
  const pill = document.querySelector(`.place-pill[data-group="${group}"].selected`);
  const base = pill ? pill.dataset.val : '';
  // Use base value if no detail typed, append detail if typed
  const val = input.value.trim() ? `${base}: ${input.value.trim()}` : base;
  if (group === 'from') tripFrom = val;
  else tripTo = val;
}

// ── Time ─────────────────────────────────────────────────────────────────────
function setTime(fieldId) {
  const t = new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById(fieldId).value = t;
}

// ── Counters ─────────────────────────────────────────────────────────────────
function adjustCount(key, delta) {
  counts[key] = Math.max(0, counts[key] + delta);
  document.getElementById(key).textContent = counts[key];
}

// ── Pre-fill inspector name ──────────────────────────────────────────────────
const savedInspector = localStorage.getItem('mu_inspector');
if (savedInspector) document.getElementById('inspectorName').value = savedInspector;

// ── Submit ───────────────────────────────────────────────────────────────────
async function submitForm() {
  const vehicle   = document.getElementById('vehicleSelect').value;
  const depTime   = document.getElementById('departureTime').value;
  const inspector = document.getElementById('inspectorName').value.trim();

  const errors = [];
  if (!vehicle)  errors.push('Select an MU vehicle');
  if (!tripFrom) errors.push('Select Trip From location');
  if (!tripTo)   errors.push('Select Trip To location');
  if (!depTime)  errors.push('Set departure time');
  if (errors.length) { showToast('⚠ ' + errors[0], true); return; }

  const opt = document.getElementById('vehicleSelect').options[document.getElementById('vehicleSelect').selectedIndex];

  const payload = {
    trip_no:        currentTripNo,
    mu_code:        vehicle,
    reg_plate:      opt?.dataset?.reg || '—',
    trip_from:      tripFrom,
    trip_to:        tripTo,
    departure_time: depTime,
    end_time:       document.getElementById('endTime').value || null,
    pax_on_board:   counts.paxOnBoard,
    pax_getting_in: counts.paxIn,
    inspector:      inspector,
    submitted_at:   new Date().toISOString(),
    service_date:   new Date().toISOString().slice(0,10),
  };

  // Always save locally first
  const saved = JSON.parse(localStorage.getItem('mu_surveys') || '[]');
  saved.push(payload);
  localStorage.setItem('mu_surveys', JSON.stringify(saved));

  // Post to middleware
  try {
    const resp = await fetch(`${API}/api/mopup/survey`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    showToast(resp.ok ? `✓ Submitted — ${currentTripNo}` : '✓ Saved locally (server error)');
  } catch {
    showToast('✓ Saved locally (offline)');
  }

  setTimeout(resetForm, 1800);
}

function resetForm() {
  currentTripNo = generateTripNo();
  document.getElementById('tripBadge').textContent = currentTripNo;
  document.getElementById('vehicleSelect').value = '';
  document.getElementById('regDisplay').textContent = '—';
  document.querySelectorAll('.place-pill').forEach(p => p.classList.remove('selected'));
  document.querySelectorAll('.place-input').forEach(i => { i.classList.remove('show'); i.value=''; });
  tripFrom = null; tripTo = null;
  document.getElementById('departureTime').value = '';
  document.getElementById('endTime').value = '';
  counts.paxOnBoard = 0; counts.paxIn = 0;
  document.getElementById('paxOnBoard').textContent = '0';
  document.getElementById('paxIn').textContent = '0';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
